name: fparkan-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  msrv-backend-neutral:
    name: MSRV backend-neutral crates
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.87.0
      - name: Test backend-neutral crates
        run: >
          cargo test
          -p fparkan-animation
          -p fparkan-binary
          -p fparkan-corpus
          -p fparkan-diagnostics
          -p fparkan-fx
          -p fparkan-inspection
          -p fparkan-material
          -p fparkan-mission-format
          -p fparkan-msh
          -p fparkan-nres
          -p fparkan-path
          -p fparkan-platform
          -p fparkan-prototype
          -p fparkan-render
          -p fparkan-resource
          -p fparkan-rsli
          -p fparkan-runtime
          -p fparkan-terrain
          -p fparkan-terrain-format
          -p fparkan-texm
          -p fparkan-vfs
          -p fparkan-world
          --all-targets
          --locked

  stage0-matrix:
    name: Stage 0-2 CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain-file: rust-toolchain.toml
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run canonical CI gate
        run: cargo xtask ci
      - name: Upload acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-0-2-acceptance-${{ matrix.os }}
          path: target/fparkan/acceptance/stage-0-2-audit.json
          if-no-files-found: ignore
